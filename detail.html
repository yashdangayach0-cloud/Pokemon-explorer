<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View the detailed stats, abilities, and characteristics of this amazing Pokémon in our premium Explorer app.">
  <title>Pokémon Detail Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    const saved = localStorage.getItem("pokeTheme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
  </script>
</head>
<body>

  <main class="detail-main" id="detail-main">

    <div class="detail-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <a href="./index.html" class="back-btn">&#8592;</a>
        <div class="name-wrap">
          <h1 class="name"></h1>
        </div>
      </div>
      <div class="pokemon-id-wrap">
        <p class="body2-fonts"></p>
      </div>
    </div>

    <div class="featured-img">
      <a href="#" class="arrow left-arrow" id="leftArrow">&#8249;</a>
      <div class="detail-img-wrapper">
        <img src="" alt="">
      </div>
      <a href="#" class="arrow right-arrow" id="rightArrow">&#8250;</a>
    </div>

    <div class="detail-card">
      <div class="power-wrapper"></div>

      <p class="about-text">About</p>

      <div class="pokemon-detail-wrapper">
        <div class="pokemon-detail-wrap">
          <div class="pokemon-detail">
            <span>⚖</span>
            <p class="weight"></p>
          </div>
          <p class="caption-fonts">Weight</p>
        </div>
        <div class="pokemon-detail-wrap">
          <div class="pokemon-detail">
            <span>↕</span>
            <p class="height"></p>
          </div>
          <p class="caption-fonts">Height</p>
        </div>
        <div class="pokemon-detail-wrap">
          <div class="pokemon-detail move"></div>
          <p class="caption-fonts">Move</p>
        </div>
      </div>

      <p class="pokemon-description"></p>

      <p class="about-text">Base Stats</p>
      <div class="stats-wrapper"></div>
    </div>

    <div class="detail-bg">◎</div>

  </main>

  <script src="pokemon-detail.js"></script>
</body>
</html>
